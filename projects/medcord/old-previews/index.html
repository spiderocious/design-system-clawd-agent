<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medcord — Design System</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  body { margin:0; height:100vh; overflow:hidden; background:#F8FAFB; }
  .app { display:grid; grid-template-columns:280px 1fr; height:100vh; }

  /* ----- Sidebar ----- */
  .sidebar {
    background:#fff;
    border-right:1px solid #E2E8F0;
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  .brand {
    padding:18px 20px 14px;
    border-bottom:1px solid #F1F5F8;
  }
  .brand-row { display:flex; align-items:center; gap:10px; }
  .brand-logo {
    width:32px; height:32px; border-radius:7px;
    background:linear-gradient(135deg,#0A87A3,#0A4F6E);
    color:#fff; display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:16px; letter-spacing:-0.02em;
  }
  .brand-name { font-size:15px; font-weight:600; letter-spacing:-0.01em; }
  .brand-sub  { font-size:11px; color:#64748B; font-family:'JetBrains Mono',monospace; margin-top:2px; }

  .search {
    margin:14px 16px 8px;
    display:flex; align-items:center; gap:8px;
    padding:0 10px; height:32px;
    background:#F1F5F8; border-radius:6px;
    border:1px solid transparent; transition:border-color 0.12s;
  }
  .search:focus-within { background:#fff; border-color:#0EA5E9; box-shadow:0 0 0 3px rgba(14,165,233,0.18); }
  .search svg { width:14px; height:14px; stroke:#94A3B8; fill:none; stroke-width:1.6; }
  .search input {
    border:none; outline:none; flex:1; background:transparent;
    font-family:'Inter',sans-serif; font-size:13px; color:#0E1117;
  }
  .search input::placeholder { color:#94A3B8; }

  .nav { flex:1; overflow-y:auto; padding:6px 8px 24px; }
  .nav::-webkit-scrollbar { width:6px; }
  .nav::-webkit-scrollbar-thumb { background:#E2E8F0; border-radius:3px; }
  .nav::-webkit-scrollbar-thumb:hover { background:#CBD5E1; }

  .group-h {
    display:flex; align-items:center; gap:8px;
    padding:14px 12px 6px;
    font-size:10px; font-weight:600;
    color:#94A3B8; text-transform:uppercase; letter-spacing:0.08em;
  }
  .group-h .num { color:#CBD5E1; font-family:'JetBrains Mono',monospace; }
  .group-h .accent { width:12px; height:2px; border-radius:1px; }

  .nav a {
    display:flex; align-items:center; gap:8px;
    padding:6px 12px; border-radius:5px;
    font-size:13px; color:#1E293B; text-decoration:none;
    cursor:pointer; transition:background 0.1s, color 0.1s;
    line-height:1.4;
  }
  .nav a:hover { background:#F8FAFB; color:#0E1117; }
  .nav a.active {
    background:#F0FBFD; color:#0A6F87; font-weight:600;
    box-shadow:inset 3px 0 0 #0A87A3;
    padding-left:14px;
  }
  .nav a .badge {
    margin-left:auto;
    background:#F1F5F8; color:#64748B;
    padding:1px 6px; border-radius:9999px;
    font-size:10px; font-weight:600; font-family:'JetBrains Mono',monospace;
  }
  .nav a.active .badge { background:#E0F2F7; color:#0A6F87; }

  .footer-strip {
    padding:10px 16px;
    border-top:1px solid #F1F5F8;
    font-size:11px; color:#94A3B8;
    display:flex; align-items:center; gap:8px;
  }
  .footer-strip .live { width:6px; height:6px; border-radius:50%; background:#16A34A; animation:pul 1.6s infinite; }
  @keyframes pul { 0%,100% { opacity:0.4 } 50% { opacity:1 } }

  /* ----- Main ----- */
  .main { display:flex; flex-direction:column; min-width:0; }
  .topbar {
    height:52px; flex-shrink:0;
    background:#fff; border-bottom:1px solid #E2E8F0;
    display:flex; align-items:center; gap:12px;
    padding:0 18px;
  }
  .crumbs {
    display:flex; align-items:center; gap:6px;
    font-size:13px; color:#475569; min-width:0;
  }
  .crumbs .part { color:#94A3B8; }
  .crumbs .sep { color:#CBD5E1; }
  .crumbs .cur { color:#0E1117; font-weight:600; }

  .topbar-spacer { flex:1; }
  .topbar-action {
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 10px; border:1px solid #E2E8F0; border-radius:6px;
    background:#fff; cursor:pointer; font-size:12px; color:#475569;
    text-decoration:none;
  }
  .topbar-action:hover { background:#F8FAFB; border-color:#CBD5E1; color:#0E1117; }
  .topbar-action svg { width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:1.6; }
  .topbar-action.primary { background:#0A87A3; border-color:#0A87A3; color:#fff; }
  .topbar-action.primary:hover { background:#0A6F87; border-color:#0A6F87; }

  .frame {
    flex:1; min-height:0;
    background:#F1F5F8;
  }
  .frame iframe {
    width:100%; height:100%; border:0; background:#F8FAFB;
    display:block;
  }

  .empty-state {
    height:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:10px;
    color:#94A3B8; font-size:13px;
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-row">
        <div class="brand-logo">M</div>
        <div>
          <div class="brand-name">Medcord</div>
          <div class="brand-sub">Design system · v0.1</div>
        </div>
      </div>
    </div>

    <div class="search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="filter" placeholder="Filter components…" autocomplete="off">
    </div>

    <nav class="nav" id="nav"><!-- populated by JS --></nav>

    <div class="footer-strip">
      <span class="live"></span>
      <span>St. Catherine's General · multi-tenant</span>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="crumbs" id="crumbs">
        <span class="part">Part 1</span>
        <span class="sep">/</span>
        <span class="cur">Welcome</span>
      </div>
      <div class="topbar-spacer"></div>
      <a class="topbar-action" href="README.md" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        README
      </a>
      <a class="topbar-action" href="original-prompt.md" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Spec
      </a>
      <button class="topbar-action primary" id="open-new">
        <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Open in tab
      </button>
    </div>
    <div class="frame">
      <iframe id="preview" src="" title="Medcord component preview"></iframe>
    </div>
  </main>
</div>

<script>
  const PARTS = [
    {
      id: 1, title: "Design tokens", accent: "#0A87A3",
      items: [
        { name:"Welcome",                    file:"" },
        { name:"Colors · Neutral",           file:"preview/colors-neutral.html" },
        { name:"Colors · Brand",             file:"preview/colors-brand.html" },
        { name:"Colors · Module accents",    file:"preview/colors-module-accents.html" },
        { name:"Colors · Semantic",          file:"preview/colors-semantic.html" },
        { name:"Colors · Clinical",          file:"preview/colors-clinical.html" },
        { name:"Colors · Status",            file:"preview/colors-status.html" },
        { name:"Colors · Data viz",          file:"preview/colors-dataviz.html" },
        { name:"Typography scale",           file:"preview/typography-scale.html" },
        { name:"Spacing tokens",             file:"preview/spacing-tokens.html" },
        { name:"Radius · Elevation",         file:"preview/radius-elevation.html" },
        { name:"Motion tokens",              file:"preview/motion-tokens.html" },
        { name:"Iconography",                file:"preview/iconography.html" },
        { name:"Density tokens",             file:"preview/density-tokens.html" },
      ]
    },
    {
      id: 2, title: "Primitives", accent: "#1D4ED8",
      items: [
        { name:"Buttons",                file:"preview/buttons.html" },
        { name:"Form inputs",            file:"preview/form-inputs.html" },
        { name:"Selection controls",     file:"preview/selection-controls.html" },
        { name:"Date & time",            file:"preview/date-time.html" },
        { name:"Specialized inputs",     file:"preview/specialized-inputs.html" },
      ]
    },
    {
      id: 3, title: "Data display", accent: "#16A34A",
      items: [
        { name:"Avatars",                file:"preview/avatars.html" },
        { name:"Badges & pills",         file:"preview/badges-pills.html" },
        { name:"Tooltips & popovers",    file:"preview/tooltips-popovers.html" },
        { name:"Cards",                  file:"preview/cards.html" },
        { name:"Lists & tables",         file:"preview/lists-tables.html" },
        { name:"Lab results table",      file:"preview/lab-results-table.html", badge:"deep" },
        { name:"Stats & metrics",        file:"preview/stats-metrics.html" },
        { name:"Charts",                 file:"preview/charts.html" },
        { name:"Progress",               file:"preview/progress.html" },
        { name:"Skeletons",              file:"preview/skeletons.html" },
        { name:"Empty states",           file:"preview/empty-states.html" },
      ]
    },
    {
      id: 4, title: "Navigation & shell", accent: "#0D9488",
      items: [
        { name:"Navigation & shell",     file:"preview/navigation-shell.html" },
        { name:"Drawers & panels",       file:"preview/drawers-panels.html" },
      ]
    },
    {
      id: 5, title: "Feedback & overlays", accent: "#D97706",
      items: [
        { name:"Toasts · banners · alerts", file:"preview/feedback-overlays.html" },
        { name:"Modals",                    file:"preview/modals.html", badge:"crit" },
      ]
    },
    {
      id: 6, title: "Domain components", accent: "#7C3AED",
      items: [
        { name:"Patient management",     file:"preview/patient-mgmt.html",  accent:"#1D4ED8" },
        { name:"Staff management",       file:"preview/staff-mgmt.html",    accent:"#7C3AED" },
        { name:"Consultation",           file:"preview/consultation.html",  accent:"#0D9488" },
        { name:"Medical records · EMR",  file:"preview/emr.html",           accent:"#16A34A", badge:"deep" },
        { name:"Equipment & assets",     file:"preview/equipment.html",     accent:"#B45309" },
      ]
    },
    {
      id: 7, title: "Cross-module patterns", accent: "#475569",
      items: [
        { name:"Mention chips · audit · AI · PHI", file:"preview/cross-module.html" },
      ]
    },
  ];
  const nav = document.getElementById('nav');
  const filter = document.getElementById('filter');
  const iframe = document.getElementById('preview');
  const crumbs = document.getElementById('crumbs');
  const openNew = document.getElementById('open-new');

  let currentFile = "";
  let currentPart = PARTS[0];

  function renderNav(query = "") {
    nav.innerHTML = "";
    const q = query.trim().toLowerCase();
    PARTS.forEach(part => {
      const items = part.items.filter(it => !q || it.name.toLowerCase().includes(q));
      if (!items.length) return;
      const h = document.createElement('div');
      h.className = 'group-h';
      h.innerHTML = `<span class="accent" style="background:${part.accent}"></span><span class="num">Part ${part.id}</span> ${part.title}`;
      nav.appendChild(h);
      items.forEach(it => {
        const a = document.createElement('a');
        a.textContent = it.name;
        a.dataset.file = it.file;
        a.dataset.part = part.id;
        a.dataset.title = it.name;
        if (it.file === currentFile) a.classList.add('active');
        if (it.badge === 'deep') {
          const b = document.createElement('span');
          b.className = 'badge';
          b.textContent = 'deep';
          b.style.background = '#FEF3C7';
          b.style.color = '#92400E';
          a.appendChild(b);
        } else if (it.badge === 'crit') {
          const b = document.createElement('span');
          b.className = 'badge';
          b.textContent = 'crit';
          b.style.background = '#FEE2E2';
          b.style.color = '#991B1B';
          a.appendChild(b);
        }
        a.addEventListener('click', e => { e.preventDefault(); load(it, part); });
        nav.appendChild(a);
      });
    });
  }

  function load(item, part) {
    currentFile = item.file;
    currentPart = part;
    if (item.file) {
      iframe.src = item.file;
      openNew.onclick = () => window.open(item.file, '_blank');
    } else {
      // Welcome screen
      iframe.srcdoc = '';
      openNew.onclick = () => {};
    }
    crumbs.innerHTML = `<span class="part">Part ${part.id} · ${part.title}</span><span class="sep">/</span><span class="cur">${item.name}</span>`;
    // Update active class
    document.querySelectorAll('.nav a').forEach(a => a.classList.toggle('active', a.dataset.file === item.file));
    // hash for shareable links
    if (item.file) location.hash = encodeURIComponent(item.file);
    else location.hash = '';
  }

  filter.addEventListener('input', e => renderNav(e.target.value));

  // keyboard nav inside the sidebar
  filter.addEventListener('keydown', e => {
    const items = [...document.querySelectorAll('.nav a')];
    const idx = items.findIndex(a => a.classList.contains('active'));
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      const next = items[Math.min(idx + 1, items.length - 1)];
      next?.click();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      const prev = items[Math.max(idx - 1, 0)];
      prev?.click();
    } else if (e.key === 'Enter' && items.length) {
      const first = items.find(a => a.classList.contains('active')) || items[0];
      first?.click();
    }
  });

  // boot — honor #hash if present, else welcome
  const hash = decodeURIComponent(location.hash.slice(1));
  if (hash) {
    let found = null, foundPart = null;
    PARTS.forEach(p => p.items.forEach(it => { if (it.file === hash) { found = it; foundPart = p; } }));
    if (found) { renderNav(); load(found, foundPart); }
    else { renderNav(); load(PARTS[0].items[0], PARTS[0]); }
  } else {
    renderNav();
    load(PARTS[0].items[0], PARTS[0]);
  }
</script>

</body>
</html>
