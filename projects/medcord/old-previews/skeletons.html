<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skeletons</title>
<link rel="stylesheet" href="_shared.css">
<style>
.sk { background:linear-gradient(90deg,#F1F5F8 0%,#E2E8F0 50%,#F1F5F8 100%); background-size:200% 100%; border-radius:4px; animation:shim 1.4s infinite; }
@keyframes shim { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }
.sk.line { height:12px; }
.sk.line.lg { height:16px; }
.sk.line.sm { height:10px; }
.sk.circle { border-radius:50%; }
.sk.box { border-radius:6px; }
.tile { background:#fff; border:1px solid #E2E8F0; border-radius:8px; padding:14px; }
</style>
</head>
<body>

<h1 class="spec-h1">Skeletons</h1>
<p class="spec-sub">Show shape, not progress. Skeletons should mirror the actual layout — text lines, avatars, tiles — so users perceive a fast load even before the data arrives.</p>

<div class="spec-section-label">Text lines</div>
<div class="tile" style="display:flex;flex-direction:column;gap:8px;max-width:420px">
  <div class="sk line" style="width:80%"></div>
  <div class="sk line" style="width:62%"></div>
  <div class="sk line" style="width:90%"></div>
  <div class="sk line" style="width:48%"></div>
</div>

<div class="spec-section-label">Avatar · card · list-row</div>
<div class="spec-grid">
  <div class="tile" style="display:flex;align-items:center;gap:10px"><div class="sk circle" style="width:36px;height:36px"></div><div style="flex:1;display:flex;flex-direction:column;gap:6px"><div class="sk line" style="width:60%"></div><div class="sk line sm" style="width:40%"></div></div></div>
  <div class="tile" style="display:flex;align-items:center;gap:10px"><div class="sk circle" style="width:48px;height:48px"></div><div style="flex:1;display:flex;flex-direction:column;gap:6px"><div class="sk line lg" style="width:75%"></div><div class="sk line sm" style="width:55%"></div></div></div>
  <div class="tile">
    <div class="sk box" style="height:80px;width:100%;margin-bottom:10px"></div>
    <div class="sk line lg" style="width:70%;margin-bottom:6px"></div>
    <div class="sk line sm" style="width:50%"></div>
  </div>
</div>

<div class="spec-section-label">Patient list — skeleton</div>
<div class="tile" style="padding:0;overflow:hidden">
  <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid #F1F5F8"><div class="sk circle" style="width:32px;height:32px"></div><div class="sk line" style="width:160px"></div><div class="sk line sm" style="width:80px"></div><div class="sk line sm" style="width:80px;margin-left:auto"></div><div class="sk box" style="width:72px;height:18px;border-radius:9999px"></div></div>
  <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid #F1F5F8"><div class="sk circle" style="width:32px;height:32px"></div><div class="sk line" style="width:140px"></div><div class="sk line sm" style="width:80px"></div><div class="sk line sm" style="width:80px;margin-left:auto"></div><div class="sk box" style="width:60px;height:18px;border-radius:9999px"></div></div>
  <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid #F1F5F8"><div class="sk circle" style="width:32px;height:32px"></div><div class="sk line" style="width:180px"></div><div class="sk line sm" style="width:80px"></div><div class="sk line sm" style="width:80px;margin-left:auto"></div><div class="sk box" style="width:90px;height:18px;border-radius:9999px"></div></div>
  <div style="display:flex;align-items:center;gap:12px;padding:12px 14px"><div class="sk circle" style="width:32px;height:32px"></div><div class="sk line" style="width:120px"></div><div class="sk line sm" style="width:80px"></div><div class="sk line sm" style="width:80px;margin-left:auto"></div><div class="sk box" style="width:80px;height:18px;border-radius:9999px"></div></div>
</div>

<div class="spec-section-label">Vitals strip — skeleton</div>
<div class="tile" style="height:200px;display:flex;flex-direction:column;gap:8px;padding:14px">
  <div style="display:flex;justify-content:space-between"><div class="sk line lg" style="width:160px"></div><div class="sk line sm" style="width:120px"></div></div>
  <div class="sk box" style="flex:1;width:100%"></div>
</div>

<div class="spec-section-label">Full-page skeleton — chart shell</div>
<div style="display:grid;grid-template-columns:240px 1fr;gap:14px;height:420px">
  <div class="tile" style="display:flex;flex-direction:column;gap:10px">
    <div class="sk line lg" style="width:80%"></div>
    <div class="sk line sm" style="width:60%"></div>
    <div class="sk line sm" style="width:75%"></div>
    <div class="sk line sm" style="width:55%"></div>
    <div class="sk line sm" style="width:80%"></div>
    <div class="sk line sm" style="width:50%"></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:10px">
    <div class="tile" style="display:flex;gap:12px;align-items:center"><div class="sk circle" style="width:48px;height:48px"></div><div style="flex:1;display:flex;flex-direction:column;gap:6px"><div class="sk line lg" style="width:55%"></div><div class="sk line sm" style="width:80%"></div></div><div class="sk box" style="width:120px;height:32px"></div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <div class="tile" style="height:96px"><div class="sk line sm" style="width:50%;margin-bottom:8px"></div><div class="sk line lg" style="width:80%"></div></div>
      <div class="tile" style="height:96px"><div class="sk line sm" style="width:50%;margin-bottom:8px"></div><div class="sk line lg" style="width:60%"></div></div>
      <div class="tile" style="height:96px"><div class="sk line sm" style="width:50%;margin-bottom:8px"></div><div class="sk line lg" style="width:70%"></div></div>
    </div>
    <div class="tile" style="flex:1"><div class="sk box" style="height:100%;width:100%"></div></div>
  </div>
</div>

</body>
</html>
