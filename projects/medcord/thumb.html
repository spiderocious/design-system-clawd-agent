<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medcord · thumb</title>
<style>
  /* Self-contained thumbnail. Renders inside an iframe in the gallery.
     Shows the signature patient-banner moment at small scale. */

  @import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,500;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #F4EFE6;
    font-family: 'Inter', system-ui, sans-serif;
    color: #181613;
    overflow: hidden;
  }

  .frame {
    height: 100%;
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 10px;
    justify-content: center;
  }

  .banner {
    background: #FBF7EF;
    border-top: 2px solid #181613;
    border-bottom: 1px solid #181613;
    position: relative;
  }

  .stamp {
    position: absolute;
    top: -1px; left: 14px; transform: translateY(-50%);
    background: #F4EFE6;
    padding: 0 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 7px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border: 1px solid #181613;
  }

  .banner .row {
    padding: 14px 16px 10px;
    display: grid; grid-template-columns: 32px 1fr;
    gap: 10px; align-items: center;
  }

  .photo {
    width: 32px; height: 32px;
    background: #ECE3D6; color: #5C4B30;
    border: 1px solid #D9D0BB;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 11px;
  }

  .name {
    font-family: 'Newsreader', serif;
    font-weight: 500;
    font-size: 18px;
    letter-spacing: -0.022em;
    line-height: 1;
  }
  .nick { color: #6E665B; font-style: italic; font-weight: 400; font-size: 14px; }

  .demo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: #6E665B;
    margin-top: 3px; letter-spacing: 0;
  }
  .demo strong { color: #181613; font-weight: 500; }

  .allergy {
    background: #B42318; color: #fff;
    padding: 5px 16px;
    font-family: 'Newsreader', serif;
    font-style: italic; font-size: 10px;
    line-height: 1.35;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid #181613;
  }
  .allergy::before {
    content: "ALLERGY";
    font-family: 'JetBrains Mono', monospace;
    font-style: normal; font-size: 7px; font-weight: 600;
    letter-spacing: 0.22em;
    background: rgba(0,0,0,0.32);
    padding: 2px 5px;
    flex-shrink: 0;
  }

  .vitals {
    display: grid; grid-template-columns: repeat(4, 1fr);
    background: #FBF7EF;
    border: 1px solid #D9D0BB;
  }
  .v {
    padding: 8px 10px;
    border-right: 1px solid #E6DFCF;
  }
  .v:last-child { border-right: 0; }
  .v .lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 7px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.16em;
    color: #6E665B;
    margin-bottom: 2px;
  }
  .v .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px; font-weight: 500;
    line-height: 1; letter-spacing: -0.02em;
    color: #181613;
  }
  .v .num .u {
    font-family: 'Inter', sans-serif;
    font-size: 7px; font-weight: 500;
    color: #6E665B; margin-left: 2px;
  }
  .v.crit .num { color: #B42318; }

  .meta-bottom {
    display: flex; justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 7px; color: #6E665B;
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 0 2px;
  }
</style>
</head>
<body>

<div class="frame">

  <div class="banner">
    <span class="stamp">Full code</span>
    <div class="row">
      <div class="photo">OA</div>
      <div>
        <div class="name">Adebayo, Olumide <span class="nick">"Olu"</span></div>
        <div class="demo">MRN <strong>10458291</strong> · 64 M · 3-N · 312A</div>
      </div>
    </div>
    <div class="allergy">Penicillin causes anaphylaxis.</div>
  </div>

  <div class="vitals">
    <div class="v">
      <div class="lbl">HR</div>
      <div class="num">76<span class="u">bpm</span></div>
    </div>
    <div class="v">
      <div class="lbl">BP</div>
      <div class="num">128/82</div>
    </div>
    <div class="v">
      <div class="lbl">SpO₂</div>
      <div class="num">98<span class="u">%</span></div>
    </div>
    <div class="v crit">
      <div class="lbl">Trop</div>
      <div class="num">2.10<span class="u">↑↑</span></div>
    </div>
  </div>

  <div class="meta-bottom">
    <span>30 surfaces</span>
    <span>v 0.2 · paper</span>
  </div>

</div>

</body>
</html>
